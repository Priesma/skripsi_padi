providers = ["python"]

[phases.setup]
nixPkgs = ["python312", "gcc", "glib", "libGL"]

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "python -m pip install -r backend/requirements.txt"
]

[start]
cmd = "cd backend && MODEL_PATH=../best.pt python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
